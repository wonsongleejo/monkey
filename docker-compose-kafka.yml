version: '3.8'
services:
  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    environment:
      # KRaft 모드로 동작하도록 broker+controller 역할을 지정
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      # 클러스터 내에서 이 노드의 고유 ID
      KAFKA_CFG_NODE_ID: "1"
      # 클라이언트용과 controller용 리스너를 함께 열기 위한 설정
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092"
      # You set the environment variable ALLOW_PLAINTEXT_LISTENER=yes. For safety reasons, do not use this flag in a production environment.
      ALLOW_PLAINTEXT_LISTENER: yes
      # 외부(클라이언트)가 접속할 때 광고할 호스트:포트 정보
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      # 리스너 이름별 보안 프로토콜 매핑 (여기서는 모두 PLAINTEXT)
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      # controller 간 통신에 사용할 리스너 이름
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # KRaft 컨트롤러 쿼럼 노드 정보 (<node_id>@<host>:<port> 형식, 복수일 경우 쉼표로 구분)
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # 로그(토픽 데이터 등)를 저장할 디렉터리
      KAFKA_LOG_DIR: /bitnami/kafka/data
    ports:
      - '29092:29092'
      # KRaft 컨트롤러 통신 포트 (외부에 노출할 필요 없으면 주석 처리)
      # - '9093:9093'
    volumes:
      - kafka_data:/bitnami/kafka/data
    networks:
      - kafka-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    environment:
      # UI 상에 표시될 클러스터 이름
      KAFKA_CLUSTERS_0_NAME: "local"
      # Kafka broker에 접속할 bootstrap server 주소
      KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS: "kafka:9092"
      # KRaft 모드이므로 Zookeeper 사용 안 함; 빈 문자열로 설정
      KAFKA_CLUSTERS_0_ZOOKEEPER: ""
      # Kafka에 접속할 때 사용할 보안 프로토콜
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: "PLAINTEXT"
    ports:
      - '18080:8080'
    depends_on:
      - kafka
    networks:
      - kafka-network

volumes:
  kafka_data:
networks:
  kafka-network:
    driver: bridge