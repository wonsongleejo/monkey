spring:
  application:
    name: store-reservation-service
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_STORE_RESERVATION_DB_PORT}/${POSTGRES_STORE_RESERVATION_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
#      password: systempass

#  #  더미데이터용 환경설정 *배포시 삭제 필요*
#  profiles:
#    active: dev

server:
  port: 8083

store-service:
  url: http://localhost:8082
slack-service:
  url: http://localhost:8086

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true