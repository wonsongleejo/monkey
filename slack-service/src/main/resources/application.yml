spring:
  application:
    name: slack-service

  datasource:
    url: jdbc:postgresql://localhost:5432/slack
    username: yeji
    password: 0708
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  #  더미데이터용 환경설정 *배포시 삭제 필요*
  profiles:
    active: dev

server:
  port: 8086

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

slack:
  bot-token: