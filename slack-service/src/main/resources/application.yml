spring:
  application:
    name: slack-service
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_SLACK_DB_PORT}/${POSTGRES_SLACK_DB}
#    배포
#    jdbc:postgresql://13:
#      125:
#        228:
#          40:${POSTGRES_USER_DB_PORT}/${POSTGRES_USER_DB}:
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  #  더미데이터용 환경설정 *배포시 삭제 필요*
  profiles:
    active: dev

server:
  port: 8086

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

slack:
  bot-token: ${SLACK_BOT_TOKEN}