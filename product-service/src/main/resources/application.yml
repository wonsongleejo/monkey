spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://localhost:5001/test_popup_store
    username: jiyun
    password: 19681205
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

server:
  port: 8084

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  group-configs:
    - group: openapi3-product-service
      paths-to-match:
        - /v1/products/**
      packages-to-scan:
        - com.monkey.productservice.presentation.controller
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /docs